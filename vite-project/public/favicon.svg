<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Deep dark circle background for high visibility on all tab designs -->
  <circle cx="16" cy="16" r="15" fill="#060911" />
  
  <!-- Outer glowing solar ring -->
  <circle cx="16" cy="16" r="13" stroke="#EF9F27" stroke-width="2" stroke-opacity="0.85" />
  
  <!-- Sun Ray points -->
  <circle cx="16" cy="6" r="1" fill="#EF9F27" />
  <circle cx="23" cy="9" r="1" fill="#EF9F27" />
  <circle cx="26" cy="16" r="1" fill="#EF9F27" />
  <circle cx="23" cy="23" r="1" fill="#EF9F27" />
  <circle cx="16" cy="26" r="1" fill="#EF9F27" />
  <circle cx="9" cy="23" r="1" fill="#EF9F27" />
  <circle cx="6" cy="16" r="1" fill="#EF9F27" />
  <circle cx="9" cy="9" r="1" fill="#EF9F27" />

  <!-- Clean, sharp power lightning bolt -->
  <path d="M19 7L11 17H16.5L14.5 25L22.5 15H17L19 7Z" fill="url(#boltGrad)" stroke="#FFFFFF" stroke-width="0.75" stroke-linejoin="round" />

  <defs>
    <!-- Golden Orange gradient -->
    <linearGradient id="boltGrad" x1="11" y1="7" x2="22.5" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD25F" />
      <stop offset="60%" stop-color="#EF9F27" />
      <stop offset="100%" stop-color="#F5A623" />
    </linearGradient>
